<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Modern Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar styling for table */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Automatically styles dynamically added cells from JavaScript */
        #userTableBody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease-in-out;
        }
        #userTableBody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        #userTableBody td {
            padding: 1.25rem 1rem;
            color: rgba(255, 255, 255, 0.80);
            font-size: 0.875rem;
            vertical-align: middle;
        }
        #userTableBody td:first-child {
            padding-left: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }
        #userTableBody td:last-child {
            padding-right: 1.5rem;
        }
        
        /* Action buttons inside the table body (if any) */
        #userTableBody button, #userTableBody a.btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#07051d] text-white p-6 sm:p-10 relative overflow-x-hidden">
    
    <!-- Background Glow Orbs -->
    <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-indigo-600/20 rounded-full blur-[120px] -z-10 animate-pulse" style="animation-duration: 8s;"></div>
    <div class="absolute bottom-0 left-0 w-[350px] h-[350px] bg-violet-600/15 rounded-full blur-[100px] -z-10 animate-pulse" style="animation-duration: 12s;"></div>

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header Card Section -->
        <div class="flex flex-col sm:flex-row justify-between items-center bg-[#0d0a2d]/60 backdrop-blur-xl border border-white/10 rounded-2xl p-6 shadow-xl gap-4">
            <div class="flex items-center gap-4">
                <!-- Decorative Icon Logo -->
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-violet-600 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-violet-600/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <div>
                    <!-- Welcomes User -->
                    <h1 id="wel" class="text-2xl sm:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent"></h1>
                    <p class="text-white/40 text-xs mt-0.5">Manage and browse the registered accounts directory</p>
                </div>
            </div>

            <!-- Red Glow Sign Out Link -->
            <a href="../signin/sign-in.html"
                class="group flex items-center gap-2 bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white px-5 py-2.5 rounded-xl border border-rose-500/25 transition-all duration-300 active:scale-[0.98] text-sm font-semibold tracking-wider uppercase">
                <svg class="w-4.5 h-4.5 transition-transform group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Sign Out
            </a>
        </div>

        <!-- Table Card Container -->
        <div class="bg-[#0d0a2d]/60 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden shadow-2xl">
            <!-- Table Info Header -->
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
                <h3 class="text-white font-bold text-lg tracking-tight">Registered Directory</h3>
                <span class="px-3 py-1 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-400 text-xs font-semibold">Live Database</span>
            </div>

            <!-- Responsive Table Wrapper -->
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/[0.02] border-b border-white/5 text-white/40 text-xs font-semibold tracking-wider uppercase">
                        <tr>
                            <th class="p-4 pl-6">Name</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Age</th>
                            <th class="p-4">City</th>
                            <th class="p-4">Profession</th>
                            <th class="p-4">Timestamp</th>
                            <th class="p-4 pr-6">Actions</th>
                        </tr>
                    </thead>

                    <!-- Populated dynamically by JavaScript -->
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="app.js"></script>
</html>
