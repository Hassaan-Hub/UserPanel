<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
    <script>
        tailwind = {
            config: {
                theme: {
                    extend: {
                        animation: {
                            'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        },
                        keyframes: {
                            shimmer: {
                                '100%': { transform: 'translateX(100%)' }
                            }
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-[#07051d] overflow-x-hidden relative p-4">
    <!-- Glow Effects / Decorative Orbs -->
    <div
        class="absolute top-1/4 left-1/4 w-[350px] h-[350px] bg-indigo-600/30 rounded-full blur-[100px] -z-10 animate-pulse-slow">
    </div>
    <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-violet-600/25 rounded-full blur-[120px] -z-10 animate-pulse"
        style="animation-duration: 12s;"></div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-fuchsia-600/10 rounded-full blur-[150px] -z-10">
    </div>

    <!-- Main Card Container -->
    <div
        class="relative w-full max-w-[840px] bg-[#0d0a2d]/80 backdrop-blur-xl border border-white/10 rounded-[30px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col md:flex-row transition-all duration-300 hover:border-white/15">

        <!-- Glow border overlay -->
        <div
            class="absolute inset-0 border border-transparent rounded-[30px] pointer-events-none bg-gradient-to-br from-white/10 to-transparent opacity-50">
        </div>

        <!-- LEFT: Inputs Section -->
        <div class="flex-1 px-6 py-8 sm:px-10 sm:py-10 md:border-r border-white/10 flex flex-col justify-between">
            <div>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-white/80 text-xs font-semibold uppercase tracking-widest flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-violet-500 animate-ping"></span>
                        Account Details
                    </h2>
                    <span class="text-white/40 text-xs">Sign up page</span>
                </div>

                <!-- Inputs Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                    <!-- User name -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">User
                            name</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </span>
                            <input type="text" placeholder="Full Name" id="name"
                                class="w-full h-11 pl-11 pr-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">Email</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input type="email" placeholder="Email Address" id="email"
                                class="w-full h-11 pl-11 pr-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">
                        </div>
                    </div>

                    <!-- Password -->
                    <!-- Password with Show/Hide Toggle -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">Password</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <!-- Lock Icon -->
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </span>
                            <input type="password" placeholder="Password" id="password"
                                class="w-full h-11 pl-11 pr-12 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">

                            <!-- Toggle Button -->
                            <button type="button" id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white/60 focus:outline-none transition-colors">
                                <!-- Eye Icon (default visible) -->
                                <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Age -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">Age</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input type="text" placeholder="Age" id="age"
                                class="w-full h-11 pl-11 pr-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">
                        </div>
                    </div>

                    <!-- City -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">City</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </span>
                            <input type="text" placeholder="City" id="city"
                                class="w-full h-11 pl-11 pr-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">
                        </div>
                    </div>

                    <!-- Profession -->
                    <div class="relative group">
                        <label
                            class="block text-white/60 text-xs font-medium mb-1.5 pl-1 transition-colors group-focus-within:text-violet-400">Profession</label>
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/30 group-focus-within:text-violet-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input type="text" placeholder="Profession" id="profession"
                                class="w-full h-11 pl-11 pr-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 outline-none transition-all duration-300 focus:bg-white/10 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 shadow-inner text-sm">
                        </div>
                    </div>

                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-white/5 text-white/30 text-[11px] flex justify-between items-center">
                <span>Secured connection</span>
                <span>All data is encrypted</span>
            </div>
        </div>

        <!-- RIGHT: Action Section -->
        <div
            class="relative w-full md:w-[260px] bg-gradient-to-b from-[#181347] to-[#0c0827] px-6 py-8 sm:px-8 sm:py-10 flex flex-col justify-between items-center text-center gap-6 md:gap-0">
            <!-- Decorative circle overlay -->
            <div
                class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(109,69,182,0.15),transparent_70%)] pointer-events-none">
            </div>

            <div class="flex flex-col items-center gap-3">
                <!-- Premium visual logo/icon -->
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-violet-600 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-violet-600/30 mb-1 animate-bounce"
                    style="animation-duration: 6s;">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <h1 class="text-white text-3xl font-extrabold tracking-tight">Sign Up</h1>
                <p class="text-white/50 text-xs leading-relaxed max-w-[180px]">Create your premium account to get
                    started instantly.</p>
            </div>

            <div class="w-full flex flex-col gap-4">
                <button id="createBtn"
                    class="relative group w-full h-12 overflow-hidden rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 text-white text-sm font-bold tracking-wider uppercase transition-all duration-300 hover:shadow-lg hover:shadow-violet-600/30 active:scale-[0.98]">
                    <!-- Button gradient shimmer hover effect -->
                    <span
                        class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></span>
                    Sign Up
                </button>

                <div class="flex items-center gap-2 my-1">
                    <span class="h-px bg-white/10 flex-1"></span>
                    <span class="text-white/20 text-[9px] uppercase font-bold tracking-wider">or</span>
                    <span class="h-px bg-white/10 flex-1"></span>
                </div>

                <div class="flex flex-col items-center gap-1.5">
                    <p class="text-white/40 text-xs">Already have an account?</p>
                    <a href="../signin/sign-in.html"
                        class="text-[#a78bdf] hover:text-[#bca4ef] text-sm font-bold transition-colors duration-200 underline decoration-2 decoration-transparent hover:decoration-[#a78bdf]">Login</a>
                </div>
            </div>

            <!-- Small footer detail -->
            <div class="text-white/20 text-[9px] mt-2 md:mt-0">
                © 2026 Premium Auth. All rights reserved.
            </div>
        </div>

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="sign-up.js"></script>

</html>
