<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0d0b3d] via-[#1d1b5c] to-[#090728] overflow-hidden">
    <!-- Glow Effect -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(120,80,255,0.25),transparent_70%)]"></div>

    <!-- Card -->
    <div
        class="relative w-[90%] max-w-[760px] bg-[#2f2b72] rounded-[25px] shadow-[0_0_50px_rgba(0,0,0,0.6)] overflow-hidden flex">

        <!-- LEFT: Inputs -->
        <div class="flex-1 px-8 py-10 border-r border-white/10">
            <p class="text-white/40 text-xs uppercase tracking-widest mb-5">Your details</p>
            <div class="space-y-4">
                <input type="text" placeholder="User name" id="name"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
                <input type="email" placeholder="Email" id="email"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
                <input type="password" placeholder="Password" id="password"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
                <input type="text" placeholder="Age" id="age"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
                <input type="text" placeholder="City" id="city"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
                <input type="text" placeholder="Profession" id="profession"
                    class="w-full h-12 px-5 rounded-lg bg-[#ececec] text-gray-700 placeholder:text-gray-500 outline-none">
            </div>
        </div>

        <!-- RIGHT: Title, Button, Login -->
        <div class="flex flex-col items-center justify-center px-8 py-10 w-[220px] gap-5">
            <h1 class="text-white text-4xl font-bold text-center">Sign up</h1>
            <p class="text-white/40 text-sm text-center leading-relaxed">Create your account to get started</p>
            <button id="createBtn"
                class="w-full h-12 bg-[#6d45b6] hover:bg-[#5d38a0] text-white text-lg font-bold rounded-lg transition">
                Sign up
            </button>
            <div class="w-full h-px bg-white/10"></div>
            <div class="text-center">
                <p class="text-white/40 text-xs mb-2">Already have an account?</p>
                <a href="../signin/sign-in.html" class="text-[#a78bdf] text-lg font-bold">Login</a>
            </div>
        </div>

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="sign-up.js"></script>
</html>
